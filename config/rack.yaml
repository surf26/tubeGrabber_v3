# hand 相机 survey 俯视（图像坐标：u 右增，v 下增）
#
#  左架 (left)                 右架 (right)
#  列: 3   2   1               列: 1   2   3
#       A  ← 上                      D  ← 上
#       B                              C
#       C                              B
#       D  ← 下                      A  ← 下
#
# left_rows / right_rows 数组：index 0 = 图像最下行，index 3 = 最上行

rack:
  cols: 3
  left_rows: ["D", "C", "B", "A"]
  right_rows: ["A", "B", "C", "D"]
  board_split_x: null
  map_slot_on_detect: true
